<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gestión de Turnos Médicos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-blue-600">Bienvenido</h2>
            <p class="text-gray-500 text-sm">Ingresá tus credenciales para continuar</p>
        </div>

        <form action="#" method="POST">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="email">Email</label>
                <input type="email" id="email"
                    class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="ejemplo@correo.com" required>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">Contraseña</label>
                <input type="password" id="password"
                    class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="********" required>
                <a href="#" class="text-xs text-blue-500 hover:underline mt-2 inline-block">¿Olvidaste tu
                    contraseña?</a>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 text-white font-bold py-2 rounded-md hover:bg-blue-700 transition duration-300">
                Iniciar Sesión
            </button>
        </form>

        <p class="text-center text-gray-600 text-sm mt-6">
            ¿No tenés cuenta? <a href="register.html" class="text-blue-600 font-bold hover:underline">Registrate acá</a>
        </p>
    </div>

</body>

</html>
